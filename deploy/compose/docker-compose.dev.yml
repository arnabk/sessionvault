# Infra-only stack for local development. Run the API + web on the host with
# `pnpm dev` while Postgres + MinIO run here. See docs/guides/local-dev.md.
#
# Ports are bound to 127.0.0.1 only, so these dev services are reachable from
# this machine but NOT from other hosts on your network.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sessionvault
      POSTGRES_PASSWORD: sessionvault
      POSTGRES_DB: sessionvault
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sessionvault"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
  miniodata:
