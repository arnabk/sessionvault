# SessionVault — production-ready stack with automatic HTTPS (Caddy).
#
#   1. cp .env.example .env   and edit values (set SV_DOMAIN for public HTTPS)
#   2. docker compose up -d --build
#
# For a real domain: point DNS at this host and set SV_DOMAIN + SV_TLS_EMAIL.
# Caddy fetches a Let's Encrypt cert automatically. For localhost it uses a
# locally-trusted self-signed cert.
#
# Storage: bundled MinIO by default. To use external S3/R2, remove the minio
# service and point S3_* at your endpoint in .env.

services:
  caddy:
    build:
      context: .
      dockerfile: deploy/compose/Caddy.Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      SV_DOMAIN: ${SV_DOMAIN:-localhost}
      SV_TLS_EMAIL: ${SV_TLS_EMAIL:-}
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "8080"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://localhost}
      DATABASE_URL: postgres://sessionvault:${POSTGRES_PASSWORD:-sessionvault}@postgres:5432/sessionvault
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-sessionvault}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      AUTH_DEFAULT_ADMIN_USERNAME: ${AUTH_DEFAULT_ADMIN_USERNAME:-admin}
      AUTH_DEFAULT_ADMIN_PASSWORD: ${AUTH_DEFAULT_ADMIN_PASSWORD:-admin}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_SESSION_TTL_DAYS: ${AUTH_SESSION_TTL_DAYS:-14}
    expose:
      - "8080"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Internal-only: no host port published. Reachable solely on the compose
    # network as postgres:5432. Never expose the database to the host/internet.
    environment:
      POSTGRES_USER: sessionvault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sessionvault}
      POSTGRES_DB: sessionvault
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sessionvault"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    # Internal-only: no host port published. Browsers reach it via Caddy at
    # https://<domain>/s3 (presigned URLs). Not exposed directly to the host.
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
  miniodata:
  caddy_data:
  caddy_config:
